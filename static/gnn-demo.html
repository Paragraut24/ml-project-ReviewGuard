<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewGuard — GNN Reviewer Graph</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;
  --surface:#111827;
  --surface-2:#1a2236;
  --border:#1e2d45;
  --text:#e2e8f0;
  --text-muted:#64748b;
  --text-faint:#334155;
  --primary:#3b82f6;
  --primary-glow:rgba(59,130,246,0.15);
  --danger:#ef4444;
  --danger-glow:rgba(239,68,68,0.15);
  --warning:#f59e0b;
  --success:#10b981;
  --genuine:#10b981;
  --spam:#ef4444;
  --suspicious:#f59e0b;
  --product:#8b5cf6;
  --radius:0.5rem;
  --radius-lg:0.75rem;
}
html{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100%}
body{min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.875rem 1.5rem;
  background:rgba(10,14,26,0.95);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.nav-brand{display:flex;align-items:center;gap:0.625rem;font-weight:700;font-size:1rem;color:var(--text)}
.nav-brand svg{color:var(--primary)}
.nav-badge{
  font-size:0.6875rem;font-weight:600;letter-spacing:0.05em;
  padding:0.2rem 0.5rem;border-radius:9999px;
  background:rgba(59,130,246,0.15);color:var(--primary);
  border:1px solid rgba(59,130,246,0.3);
}
.nav-back{
  display:flex;align-items:center;gap:0.375rem;
  font-size:0.8125rem;color:var(--text-muted);
  text-decoration:none;
  padding:0.375rem 0.75rem;border-radius:var(--radius);
  border:1px solid var(--border);
  transition:all 0.18s ease;
}
.nav-back:hover{color:var(--text);border-color:var(--primary);background:var(--primary-glow)}

/* LAYOUT */
.app{display:grid;grid-template-columns:1fr 340px;flex:1;overflow:hidden;height:calc(100vh - 57px)}
.graph-area{position:relative;background:var(--bg);overflow:hidden}
.sidebar{
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* CONTROLS BAR */
.controls{
  display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;
  padding:0.875rem 1.25rem;
  background:rgba(17,24,39,0.9);
  border-bottom:1px solid var(--border);
  position:absolute;top:0;left:0;right:0;z-index:10;
}
.ctrl-label{font-size:0.75rem;font-weight:600;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase}
.ctrl-group{display:flex;align-items:center;gap:0.375rem}
.filter-btn{
  font-size:0.75rem;font-weight:500;
  padding:0.3rem 0.75rem;border-radius:9999px;
  border:1px solid var(--border);
  background:transparent;color:var(--text-muted);
  cursor:pointer;transition:all 0.18s ease;
}
.filter-btn:hover{color:var(--text);border-color:var(--text-faint)}
.filter-btn.active{color:var(--text);background:var(--surface-2);border-color:var(--primary)}
.filter-btn.spam-btn.active{border-color:var(--spam);color:var(--spam);background:rgba(239,68,68,0.1)}
.filter-btn.sus-btn.active{border-color:var(--warning);color:var(--warning);background:rgba(245,158,11,0.1)}
.filter-btn.genuine-btn.active{border-color:var(--genuine);color:var(--genuine);background:rgba(16,185,129,0.1)}
.sep{width:1px;height:20px;background:var(--border)}
.new-btn{
  margin-left:auto;
  font-size:0.75rem;font-weight:600;
  padding:0.35rem 0.875rem;border-radius:var(--radius);
  background:var(--primary);color:#fff;border:none;cursor:pointer;
  transition:all 0.18s ease;
}
.new-btn:hover{background:#2563eb;box-shadow:0 0 16px rgba(59,130,246,0.4)}

/* GRAPH SVG */
#graph-svg{width:100%;height:100%;display:block;margin-top:56px}

/* LEGEND */
.legend{
  position:absolute;bottom:1rem;left:1.25rem;
  display:flex;gap:1rem;flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:0.35rem;font-size:0.6875rem;color:var(--text-muted)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* SIDEBAR SECTIONS */
.sidebar-header{
  padding:1rem 1.25rem 0.875rem;
  border-bottom:1px solid var(--border);
}
.sidebar-header h2{font-size:0.8125rem;font-weight:600;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase}
.sidebar-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:1rem}
.sidebar-body::-webkit-scrollbar{width:4px}
.sidebar-body::-webkit-scrollbar-track{background:transparent}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:9999px}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:2.5rem 1rem;gap:0.75rem;
  color:var(--text-muted);
}
.empty-icon{font-size:2rem;opacity:0.4}
.empty-state p{font-size:0.8125rem;max-width:22ch;line-height:1.5}

/* REVIEWER CARD */
.reviewer-card{display:flex;flex-direction:column;gap:0.875rem}
.card-header{display:flex;align-items:center;gap:0.75rem}
.avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:700;flex-shrink:0;
}
.avatar.spam{background:rgba(239,68,68,0.15);color:var(--spam);border:2px solid rgba(239,68,68,0.3)}
.avatar.suspicious{background:rgba(245,158,11,0.12);color:var(--warning);border:2px solid rgba(245,158,11,0.25)}
.avatar.genuine{background:rgba(16,185,129,0.12);color:var(--genuine);border:2px solid rgba(16,185,129,0.25)}
.reviewer-name{font-size:0.9375rem;font-weight:600;color:var(--text)}
.reviewer-id{font-size:0.6875rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.verdict-badge{
  display:inline-flex;align-items:center;gap:0.3rem;
  font-size:0.6875rem;font-weight:700;letter-spacing:0.06em;
  padding:0.25rem 0.625rem;border-radius:9999px;margin-top:0.125rem;
}
.verdict-badge.spam{background:rgba(239,68,68,0.12);color:var(--spam);border:1px solid rgba(239,68,68,0.25)}
.verdict-badge.suspicious{background:rgba(245,158,11,0.1);color:var(--warning);border:1px solid rgba(245,158,11,0.2)}
.verdict-badge.genuine{background:rgba(16,185,129,0.1);color:var(--genuine);border:1px solid rgba(16,185,129,0.2)}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.stat-card{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius);padding:0.625rem 0.75rem;
}
.stat-label{font-size:0.6375rem;color:var(--text-muted);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:0.2rem}
.stat-value{font-size:1.125rem;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.stat-value.red{color:var(--spam)}
.stat-value.yellow{color:var(--warning)}
.stat-value.green{color:var(--genuine)}

/* BEHAVIOR BARS */
.section-title{font-size:0.6875rem;font-weight:600;color:var(--text-muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:0.5rem}
.behavior-bars{display:flex;flex-direction:column;gap:0.5rem}
.bar-row{display:flex;flex-direction:column;gap:0.2rem}
.bar-label-row{display:flex;justify-content:space-between;align-items:center}
.bar-label{font-size:0.75rem;color:var(--text-muted)}
.bar-val{font-size:0.75rem;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text)}
.bar-track{height:5px;background:var(--border);border-radius:9999px;overflow:hidden}
.bar-fill{height:100%;border-radius:9999px;transition:width 0.6s cubic-bezier(0.16,1,0.3,1)}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0.375rem}
.tl-item{
  display:flex;align-items:center;gap:0.625rem;
  font-size:0.75rem;padding:0.4rem 0.625rem;
  background:var(--surface-2);border-radius:var(--radius);
  border:1px solid var(--border);
}
.tl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tl-time{font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-size:0.6875rem;flex-shrink:0}
.tl-product{color:var(--text);flex:1}
.tl-stars{color:var(--warning);font-size:0.6875rem}

/* SIGNALS */
.signals{display:flex;flex-direction:column;gap:0.375rem}
.signal-item{
  display:flex;align-items:flex-start;gap:0.5rem;
  font-size:0.75rem;color:var(--text-muted);
  padding:0.4rem 0.625rem;
  background:var(--surface-2);border-radius:var(--radius);
  border-left:2px solid transparent;
}
.signal-item.red{border-color:var(--spam);color:#fca5a5}
.signal-item.yellow{border-color:var(--warning);color:#fcd34d}
.signal-item.green{border-color:var(--genuine);color:#6ee7b7}
.signal-icon{flex-shrink:0;margin-top:0.05rem}

/* STATS BAR BOTTOM */
.stats-bar{
  display:flex;gap:0;border-top:1px solid var(--border);
  background:var(--surface);
}
.stat-pill{
  flex:1;text-align:center;padding:0.625rem 0.5rem;
  border-right:1px solid var(--border);
}
.stat-pill:last-child{border-right:none}
.sp-val{font-size:1rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.sp-label{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em}

/* TOOLTIP */
.tooltip{
  position:absolute;pointer-events:none;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius);padding:0.5rem 0.75rem;
  font-size:0.75rem;color:var(--text);
  white-space:nowrap;opacity:0;transition:opacity 0.15s;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  z-index:50;
}

@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>

<nav>
  <div class="nav-brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
    </svg>
    ReviewGuard
    <span class="nav-badge">GNN Layer</span>
  </div>
  <a href="/" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to App
  </a>
</nav>

<div class="app">
  <div class="graph-area" id="graph-area">
    <div class="controls" id="controls">
      <span class="ctrl-label">Filter</span>
      <div class="ctrl-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn spam-btn" data-filter="spam">Spam Bots</button>
        <button class="filter-btn sus-btn" data-filter="suspicious">Suspicious</button>
        <button class="filter-btn genuine-btn" data-filter="genuine">Genuine</button>
      </div>
      <div class="sep"></div>
      <span class="ctrl-label">Show</span>
      <div class="ctrl-group">
        <button class="filter-btn active" data-type="all-types">All Nodes</button>
        <button class="filter-btn" data-type="reviewers-only">Reviewers Only</button>
      </div>
      <button class="new-btn" id="new-graph-btn">&#8635; New Graph</button>
    </div>
    <svg id="graph-svg"></svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Spam Bot</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Suspicious</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Genuine</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6;opacity:0.7"></div>Product</div>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Reviewer Profile</h2>
    </div>
    <div class="sidebar-body" id="sidebar-body">
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <p>Click any reviewer node to inspect their behavioral profile</p>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar">
      <div class="stat-pill"><div class="sp-val" id="sb-total" style="color:#e2e8f0">0</div><div class="sp-label">Reviewers</div></div>
      <div class="stat-pill"><div class="sp-val" id="sb-spam" style="color:#ef4444">0</div><div class="sp-label">Spam</div></div>
      <div class="stat-pill"><div class="sp-val" id="sb-sus" style="color:#f59e0b">0</div><div class="sp-label">Suspicious</div></div>
      <div class="stat-pill"><div class="sp-val" id="sb-genuine" style="color:#10b981">0</div><div class="sp-label">Genuine</div></div>
    </div>
  </div>
</div>

<script>
// ── DATA GENERATION ───────────────────────────────────────────────────────────
const BRANDS = ['TechCore','NovaBuy','FlipZone','ShopMax','QuickMart'];
const PRODUCTS = [
  'Wireless Earbuds','USB-C Hub','Laptop Stand','Mechanical Keyboard','RGB Mouse',
  'Phone Case','Screen Protector','Power Bank','Smart Watch','Bluetooth Speaker',
  'Gaming Headset','Webcam HD','LED Desk Lamp','Laptop Bag','Cooling Pad'
];
const FIRST = ['Raj','Priya','Amit','Sneha','Rohan','Ankita','Vikram','Neha','Arjun','Pooja',
               'Kiran','Suresh','Divya','Rahul','Kavya','Sanjay','Meera','Arun','Nisha','Deepak'];
const LAST  = ['Sharma','Patel','Verma','Singh','Kumar','Gupta','Joshi','Rao','Nair','Iyer'];

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function choice(arr){return arr[Math.floor(Math.random()*arr.length)]}
function fmtDate(d){return d.toISOString().slice(0,10)}

function genTimestamps(count, pattern){
  const base = new Date('2024-01-01');
  const stamps = [];
  if(pattern === 'burst'){
    // All reviews in 2-3 day windows, several times
    for(let i=0;i<count;i++){
      const burstDay = rand(0,25)*14;
      const offset = rand(0,2);
      const d = new Date(base); d.setDate(d.getDate()+burstDay+offset);
      stamps.push(d);
    }
  } else if(pattern === 'regular'){
    // Every N days exactly — bot-like regularity
    const interval = rand(3,7);
    for(let i=0;i<count;i++){
      const d = new Date(base); d.setDate(d.getDate()+i*interval+rand(-1,1));
      stamps.push(d);
    }
  } else {
    // Natural — random spread over months
    for(let i=0;i<count;i++){
      const d = new Date(base); d.setDate(d.getDate()+rand(0,350));
      stamps.push(d);
    }
  }
  return stamps.sort((a,b)=>a-b);
}

function generateGraph(){
  const reviewers = [];
  const products  = [];
  const edges     = [];

  // Products pool
  const usedProducts = [];
  const numProducts = rand(8,12);
  const shuffled = [...PRODUCTS].sort(()=>Math.random()-0.5);
  for(let i=0;i<numProducts;i++){
    const brand = choice(BRANDS);
    usedProducts.push({
      id: 'p'+i,
      type: 'product',
      name: shuffled[i],
      brand,
      label: shuffled[i].split(' ').map(w=>w[0]).join(''),
    });
  }
  products.push(...usedProducts);

  // Spam bots (2-3)
  const numSpam = rand(2,3);
  for(let i=0;i<numSpam;i++){
    const name = FIRST[i]+' '+LAST[i];
    const reviewCount = rand(18,35);
    const brandLock = choice(BRANDS);
    // Only reviews products from one brand
    const brandProds = usedProducts.filter((_,idx)=>idx%BRANDS.length===BRANDS.indexOf(brandLock)%usedProducts.length);
    const targetProds = brandProds.length ? brandProds : usedProducts.slice(0,3);
    const pattern = Math.random()>0.5 ? 'burst' : 'regular';
    const stamps = genTimestamps(reviewCount, pattern);
    const timeline = stamps.map((s,idx)=>({
      date: fmtDate(s),
      product: choice(targetProds).name,
      stars: rand(4,5),
      productId: choice(targetProds).id
    }));
    const node = {
      id:'r'+i, type:'reviewer',
      name, initials: name.split(' ').map(w=>w[0]).join(''),
      verdict:'spam',
      reviewCount,
      brandConcentration: rand(85,100),
      burstScore: rand(80,98),
      avgRating: (rand(45,50)/10).toFixed(1),
      ratingVariance: (rand(1,8)/10).toFixed(2),
      accountAgeDays: rand(30,180),
      positiveOnlyRatio: rand(88,100),
      pattern,
      timeline,
      signals:[
        {type:'red', text: pattern==='burst'
          ? `${reviewCount} reviews posted in burst windows — bot-like temporal clustering`
          : `Reviews posted every ${rand(3,7)} days with machine-like regularity`},
        {type:'red', text:`${rand(85,100)}% reviews target only "${brandLock}" brand products`},
        {type:'red', text:`${rand(88,100)}% 5-star ratings — no critical reviews found`},
        {type:'yellow', text:`Account only ${rand(30,180)} days old with unusually high activity`},
      ]
    };
    reviewers.push(node);
    timeline.slice(0,6).forEach(t=>{
      const prod = usedProducts.find(p=>p.name===t.product)||usedProducts[0];
      edges.push({source:node.id, target:prod.id, type:'spam'});
    });
  }

  // Suspicious (2-3)
  const numSus = rand(2,3);
  for(let i=0;i<numSus;i++){
    const name = FIRST[numSpam+i]+' '+LAST[(numSpam+i)%LAST.length];
    const reviewCount = rand(8,16);
    const stamps = genTimestamps(reviewCount, Math.random()>0.5?'burst':'natural');
    const targetProds = usedProducts.slice(0, rand(3,6));
    const timeline = stamps.map(s=>({
      date: fmtDate(s),
      product: choice(targetProds).name,
      stars: rand(3,5),
      productId: choice(targetProds).id
    }));
    const node = {
      id:'r'+(numSpam+i), type:'reviewer',
      name, initials: name.split(' ').map(w=>w[0]).join(''),
      verdict:'suspicious',
      reviewCount,
      brandConcentration: rand(55,75),
      burstScore: rand(45,70),
      avgRating: (rand(38,48)/10).toFixed(1),
      ratingVariance: (rand(8,18)/10).toFixed(2),
      accountAgeDays: rand(100,400),
      positiveOnlyRatio: rand(60,80),
      pattern:'mixed',
      timeline,
      signals:[
        {type:'yellow', text:`${rand(55,75)}% reviews concentrated on similar brand products`},
        {type:'yellow', text:`Occasional burst periods detected — ${rand(3,5)} reviews in single day`},
        {type:'green', text:`Some negative reviews found — not exclusively positive`},
      ]
    };
    reviewers.push(node);
    timeline.slice(0,5).forEach(t=>{
      const prod = usedProducts.find(p=>p.name===t.product)||usedProducts[0];
      edges.push({source:node.id, target:prod.id, type:'suspicious'});
    });
  }

  // Genuine (5-7)
  const numGenuine = rand(5,7);
  for(let i=0;i<numGenuine;i++){
    const idx = numSpam+numSus+i;
    const name = FIRST[idx%FIRST.length]+' '+LAST[(idx+3)%LAST.length];
    const reviewCount = rand(2,8);
    const stamps = genTimestamps(reviewCount, 'natural');
    const targetProds = usedProducts.slice(rand(0,4), rand(5,10));
    const timeline = stamps.map(s=>({
      date: fmtDate(s),
      product: choice(targetProds).name,
      stars: rand(2,5),
      productId: choice(targetProds).id
    }));
    const node = {
      id:'r'+(idx), type:'reviewer',
      name, initials: name.split(' ').map(w=>w[0]).join(''),
      verdict:'genuine',
      reviewCount,
      brandConcentration: rand(15,40),
      burstScore: rand(5,25),
      avgRating: (rand(30,44)/10).toFixed(1),
      ratingVariance: (rand(15,35)/10).toFixed(2),
      accountAgeDays: rand(300,1200),
      positiveOnlyRatio: rand(30,60),
      pattern:'natural',
      timeline,
      signals:[
        {type:'green', text:`Reviews spread naturally over ${rand(6,18)} months`},
        {type:'green', text:`${rand(2,5)} different brand categories reviewed — diverse buyer`},
        {type:'green', text:`Mixed ratings including ${rand(1,3)}-star reviews — authentic feedback`},
      ]
    };
    reviewers.push(node);
    timeline.slice(0,4).forEach(t=>{
      const prod = usedProducts.find(p=>p.name===t.product)||usedProducts[0];
      edges.push({source:node.id, target:prod.id, type:'genuine'});
    });
  }

  return {
    nodes: [...reviewers, ...products],
    edges,
    reviewers,
    products: usedProducts
  };
}

// ── D3 GRAPH ──────────────────────────────────────────────────────────────────
let currentData = generateGraph();
let activeFilter = 'all';
let activeType   = 'all-types';
let selectedNode = null;

const COLOR = {spam:'#ef4444', suspicious:'#f59e0b', genuine:'#10b981', product:'#8b5cf6'};

function nodeColor(d){
  if(d.type==='product') return COLOR.product;
  return COLOR[d.verdict] || '#64748b';
}
function nodeRadius(d){
  if(d.type==='product') return 10;
  const base = {spam:20, suspicious:16, genuine:13};
  return base[d.verdict] || 13;
}

function drawGraph(data){
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  const container = document.getElementById('graph-area');
  const W = container.clientWidth;
  const H = container.clientHeight - 56;

  svg.attr('viewBox',`0 0 ${W} ${H}`);

  // Glow filters
  const defs = svg.append('defs');
  ['spam','suspicious','genuine','product'].forEach(k=>{
    const f = defs.append('filter').attr('id','glow-'+k).attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
    f.append('feGaussianBlur').attr('stdDeviation','4').attr('result','blur');
    const merge = f.append('feMerge');
    merge.append('feMergeNode').attr('in','blur');
    merge.append('feMergeNode').attr('in','SourceGraphic');
  });

  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3,3]).on('zoom', e=>g.attr('transform',e.transform)));

  // Filter nodes/edges
  let visNodes = data.nodes;
  if(activeFilter !== 'all')
    visNodes = data.nodes.filter(d=>d.type==='product' || d.verdict===activeFilter);
  if(activeType === 'reviewers-only')
    visNodes = visNodes.filter(d=>d.type==='reviewer');

  const visIds = new Set(visNodes.map(d=>d.id));
  const visEdges = data.edges.filter(e=>visIds.has(e.source.id||e.source) && visIds.has(e.target.id||e.target));

  // Simulation
  const sim = d3.forceSimulation(visNodes)
    .force('link', d3.forceLink(visEdges).id(d=>d.id).distance(d=>{
      if(d.type==='spam') return 80; if(d.type==='suspicious') return 100; return 130;
    }).strength(0.4))
    .force('charge', d3.forceManyBody().strength(d=>d.type==='product'?-120:-200))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide().radius(d=>nodeRadius(d)+14));

  // Edges
  const link = g.append('g').selectAll('line')
    .data(visEdges).join('line')
    .attr('stroke', d=>COLOR[d.type]||'#334155')
    .attr('stroke-opacity', 0.25)
    .attr('stroke-width', d=>d.type==='spam'?1.5:1);

  // Node groups
  const node = g.append('g').selectAll('g')
    .data(visNodes).join('g')
    .attr('cursor', d=>d.type==='reviewer'?'pointer':'default')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null})
    );

  // Outer ring for reviewers
  node.filter(d=>d.type==='reviewer').append('circle')
    .attr('r', d=>nodeRadius(d)+5)
    .attr('fill','none')
    .attr('stroke', d=>nodeColor(d))
    .attr('stroke-opacity',0.2)
    .attr('stroke-width',1.5);

  // Main circle
  node.append('circle')
    .attr('r', nodeRadius)
    .attr('fill', d=>d.type==='reviewer'?nodeColor(d)+'22':'#8b5cf622')
    .attr('stroke', nodeColor)
    .attr('stroke-width', d=>d.type==='reviewer'?2:1.5)
    .attr('filter', d=>d.type==='reviewer'?`url(#glow-${d.verdict})`:`url(#glow-product)`);

  // Initials / label
  node.filter(d=>d.type==='reviewer').append('text')
    .text(d=>d.initials)
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('font-size','9px').attr('font-weight','700')
    .attr('fill', nodeColor).attr('pointer-events','none');

  node.filter(d=>d.type==='product').append('text')
    .text(d=>d.label)
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('font-size','7px').attr('font-weight','600')
    .attr('fill','#a78bfa').attr('pointer-events','none');

  // Name labels below reviewer nodes
  node.filter(d=>d.type==='reviewer').append('text')
    .text(d=>d.name.split(' ')[0])
    .attr('text-anchor','middle').attr('y', d=>nodeRadius(d)+13)
    .attr('font-size','9px').attr('fill','#64748b').attr('pointer-events','none');

  // Hover tooltip
  const tooltip = document.getElementById('tooltip');
  node.on('mouseover',(e,d)=>{
    let html = d.type==='reviewer'
      ? `<strong>${d.name}</strong> &nbsp;<span style="color:${nodeColor(d)}">${d.verdict.toUpperCase()}</span><br>${d.reviewCount} reviews · Burst: ${d.burstScore}%`
      : `<strong>${d.name}</strong><br><span style="color:#a78bfa">${d.brand}</span>`;
    tooltip.innerHTML=html;
    tooltip.style.opacity='1';
  }).on('mousemove',e=>{
    tooltip.style.left=(e.offsetX+14)+'px';
    tooltip.style.top=(e.offsetY-8)+'px';
  }).on('mouseout',()=>{tooltip.style.opacity='0'});

  // Click reviewer
  node.filter(d=>d.type==='reviewer').on('click',(e,d)=>{
    selectedNode=d;
    renderSidebar(d);
    // highlight
    node.select('circle').attr('stroke-opacity',n=>n.id===d.id?1:0.4);
    link.attr('stroke-opacity',l=>(l.source.id===d.id||l.target.id===d.id)?0.7:0.1);
    e.stopPropagation();
  });

  svg.on('click',()=>{
    if(selectedNode){
      selectedNode=null;
      node.select('circle').attr('stroke-opacity',1);
      link.attr('stroke-opacity',0.25);
      renderSidebar(null);
    }
  });

  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
  });

  // Update stats bar
  const reviewers = data.reviewers;
  document.getElementById('sb-total').textContent = reviewers.length;
  document.getElementById('sb-spam').textContent  = reviewers.filter(r=>r.verdict==='spam').length;
  document.getElementById('sb-sus').textContent   = reviewers.filter(r=>r.verdict==='suspicious').length;
  document.getElementById('sb-genuine').textContent = reviewers.filter(r=>r.verdict==='genuine').length;
}

// ── SIDEBAR RENDER ────────────────────────────────────────────────────────────
function starStr(n){return '★'.repeat(n)+'☆'.repeat(5-n)}

function renderSidebar(d){
  const body = document.getElementById('sidebar-body');
  if(!d){
    body.innerHTML=`<div class="empty-state"><div class="empty-icon">⬡</div><p>Click any reviewer node to inspect their behavioral profile</p></div>`;
    return;
  }
  const vc = d.verdict;
  const barColor = {spam:'#ef4444',suspicious:'#f59e0b',genuine:'#10b981'};
  const valColor = v=>v>70?'red':v>45?'yellow':'green';

  const timelineHTML = d.timeline.slice(0,5).map(t=>`
    <div class="tl-item">
      <div class="tl-dot" style="background:${barColor[vc]}"></div>
      <span class="tl-time">${t.date}</span>
      <span class="tl-product">${t.product}</span>
      <span class="tl-stars">${starStr(t.stars)}</span>
    </div>`).join('');

  const signalHTML = d.signals.map(s=>`
    <div class="signal-item ${s.type}">
      <span class="signal-icon">${s.type==='red'?'⚠':'s.type'==='green'?'✓':'◆'}</span>
      ${s.text}
    </div>`).join('');

  body.innerHTML=`
  <div class="reviewer-card">
    <div class="card-header">
      <div class="avatar ${vc}">${d.initials}</div>
      <div>
        <div class="reviewer-name">${d.name}</div>
        <div class="reviewer-id">ID: rev_${d.id.slice(1).padStart(6,'0')}</div>
        <div class="verdict-badge ${vc}">${vc==='spam'?'⚠ SPAM BOT':vc==='suspicious'?'◆ SUSPICIOUS':'✓ GENUINE'}</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total Reviews</div>
        <div class="stat-value ${valColor(d.reviewCount/35*100)}">${d.reviewCount}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Rating</div>
        <div class="stat-value ${d.avgRating>=4.5?'red':d.avgRating>=4?'yellow':'green'}">${d.avgRating}★</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Account Age</div>
        <div class="stat-value">${d.accountAgeDays}d</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rating Variance</div>
        <div class="stat-value ${parseFloat(d.ratingVariance)<0.3?'red':'green'}">${d.ratingVariance}</div>
      </div>
    </div>

    <div>
      <div class="section-title">Behavioral Signals</div>
      <div class="behavior-bars">
        <div class="bar-row">
          <div class="bar-label-row">
            <span class="bar-label">Burst Score</span>
            <span class="bar-val" style="color:${d.burstScore>70?'#ef4444':d.burstScore>45?'#f59e0b':'#10b981'}">${d.burstScore}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${d.burstScore}%;background:${d.burstScore>70?'#ef4444':d.burstScore>45?'#f59e0b':'#10b981'}"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label-row">
            <span class="bar-label">Brand Concentration</span>
            <span class="bar-val" style="color:${d.brandConcentration>70?'#ef4444':d.brandConcentration>45?'#f59e0b':'#10b981'}">${d.brandConcentration}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${d.brandConcentration}%;background:${d.brandConcentration>70?'#ef4444':d.brandConcentration>45?'#f59e0b':'#10b981'}"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label-row">
            <span class="bar-label">Positive-Only Ratio</span>
            <span class="bar-val" style="color:${d.positiveOnlyRatio>80?'#ef4444':d.positiveOnlyRatio>60?'#f59e0b':'#10b981'}">${d.positiveOnlyRatio}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${d.positiveOnlyRatio}%;background:${d.positiveOnlyRatio>80?'#ef4444':d.positiveOnlyRatio>60?'#f59e0b':'#10b981'}"></div></div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Review Timeline</div>
      <div class="timeline">${timelineHTML}</div>
    </div>

    <div>
      <div class="section-title">GNN Detection Signals</div>
      <div class="signals">${signalHTML}</div>
    </div>
  </div>`;
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-filter]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    drawGraph(currentData);
  });
});

document.querySelectorAll('[data-type]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    drawGraph(currentData);
  });
});

document.getElementById('new-graph-btn').addEventListener('click',()=>{
  currentData = generateGraph();
  selectedNode = null;
  renderSidebar(null);
  drawGraph(currentData);
});

// Init
drawGraph(currentData);
window.addEventListener('resize', ()=>drawGraph(currentData));
</script>
</body>
</html>
